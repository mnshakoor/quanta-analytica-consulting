<style>
  :root {
    --obsidian: #0a0c10;
    --obsidian-mid: #111318;
    --obsidian-light: #1a1e26;
    --obsidian-border: #1f2430;
    --gold: #c8a96e;
    --gold-light: #dfc28a;
    --gold-dim: #8a6e42;
    --gold-trace: rgba(200, 169, 110, 0.08);
    --text-primary: #e8e2d6;
    --text-secondary: #9a9080;
    --text-muted: #5a5550;
    --accent-red: #8c3a2e;
    --page-width: 760px;
    --page-height: 540px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--obsidian);
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(200,169,110,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid lines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* ========== TOP BAR ========== */
  .top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: rgba(10,12,16,0.95);
    border-bottom: 1px solid var(--obsidian-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .top-bar-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .top-bar-center {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .top-bar-meta {
    font-family: 'Barlow', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }

  /* ========== MAIN VIEWER ========== */
  .viewer {
    position: relative;
    z-index: 10;
    width: var(--page-width);
    height: var(--page-height);
    margin-top: 44px;
  }

  /* ========== PAGE CONTAINER ========== */
  .pages-container {
    position: relative;
    width: 100%;
    height: 100%;
    perspective: 2000px;
  }

  .page {
    position: absolute;
    inset: 0;
    background: var(--obsidian-mid);
    border: 1px solid var(--obsidian-border);
    overflow: hidden;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }

  .page.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }

  .page.exit-left {
    opacity: 0;
    transform: translateX(-40px);
    pointer-events: none;
  }

  /* ========== COVER PAGE ========== */
  .cover {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 100% 80% at 50% 50%, rgba(200,169,110,0.06) 0%, transparent 70%);
  }

  .cover-rule-top {
    width: 280px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 32px;
  }

  .cover-series {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px;
    font-weight: 300;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .cover-title em {
    font-style: italic;
    color: var(--gold-light);
  }

  .cover-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 400;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 460px;
    margin-bottom: 36px;
  }

  .cover-rule-mid {
    width: 48px;
    height: 1px;
    background: var(--gold-dim);
    margin-bottom: 28px;
  }

  .cover-author {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .cover-meta-row {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 32px;
  }

  .cover-meta-item {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .cover-meta-sep {
    width: 3px;
    height: 3px;
    background: var(--gold-dim);
    border-radius: 50%;
  }

  .cover-rule-bottom {
    width: 280px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .cover-classification {
    position: absolute;
    bottom: 18px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ========== TOC PAGE ========== */
  .toc-page {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 36px 48px;
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--obsidian-border);
  }

  .page-header-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .page-header-rule {
    flex: 1;
    height: 1px;
    background: var(--obsidian-border);
  }

  .page-header-page {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .toc-title-block {
    margin-bottom: 24px;
  }

  .toc-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .toc-heading em {
    color: var(--gold-light);
    font-style: italic;
  }

  .toc-subheading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
  }

  .toc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 32px;
  }

  .toc-entry {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(31,36,48,0.6);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .toc-entry:hover .toc-ch-num {
    color: var(--gold);
  }

  .toc-entry:hover .toc-ch-title {
    color: var(--text-primary);
  }

  .toc-ch-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    text-transform: uppercase;
    white-space: nowrap;
    transition: color 0.2s;
    min-width: 26px;
  }

  .toc-ch-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.35;
    transition: color 0.2s;
    flex: 1;
  }

  .toc-dots {
    flex: 1;
    border-bottom: 1px dotted var(--obsidian-border);
    margin: 0 6px;
    margin-bottom: 3px;
  }

  /* ========== CHAPTER PAGES ========== */
  .chapter-page {
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 0;
  }

  .chapter-header {
    padding: 22px 44px 18px;
    border-bottom: 1px solid var(--obsidian-border);
    display: flex;
    align-items: flex-end;
    gap: 20px;
    background: rgba(0,0,0,0.2);
  }

  .chapter-num-block {
    flex-shrink: 0;
  }

  .chapter-num-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .chapter-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    line-height: 1;
    color: var(--gold);
    opacity: 0.4;
  }

  .chapter-title-block {
    flex: 1;
    padding-bottom: 4px;
  }

  .chapter-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .chapter-domain {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--gold-dim);
    text-transform: uppercase;
  }

  .chapter-body {
    padding: 24px 44px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--obsidian-border) transparent;
    flex: 1;
  }

  .chapter-body::-webkit-scrollbar {
    width: 3px;
  }

  .chapter-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .chapter-body::-webkit-scrollbar-thumb {
    background: var(--obsidian-border);
    border-radius: 2px;
  }

  .chapter-body p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14.5px;
    font-weight: 400;
    line-height: 1.75;
    color: var(--text-secondary);
    margin-bottom: 14px;
    text-align: justify;
    hyphens: auto;
  }

  .chapter-body p:first-child {
    color: var(--text-primary);
    font-size: 15px;
  }

  .chapter-body p:first-child::first-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    color: var(--gold);
    float: left;
    line-height: 0.8;
    margin-right: 6px;
    margin-top: 6px;
  }

  .bluf-block {
    background: var(--gold-trace);
    border-left: 2px solid var(--gold-dim);
    padding: 12px 16px;
    margin-bottom: 20px;
  }

  .bluf-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .bluf-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ========== PAGE FOOTER ========== */
  .page-footer {
    padding: 12px 44px;
    border-top: 1px solid var(--obsidian-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.2);
  }

  .footer-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .footer-brand span {
    color: var(--gold-dim);
  }

  .footer-classification {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ========== NOTES PAGE ========== */
  .notes-body {
    padding: 20px 44px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--obsidian-border) transparent;
  }

  .notes-body::-webkit-scrollbar {
    width: 3px;
  }

  .notes-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--obsidian-border);
  }

  .note-entry {
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 8px;
    margin-bottom: 10px;
    align-items: start;
  }

  .note-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--gold-dim);
    text-align: right;
    padding-top: 1px;
  }

  .note-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.55;
    font-style: italic;
  }

  /* ========== CLOSING PAGE ========== */
  .closing-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px;
    text-align: center;
    position: relative;
  }

  .closing-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(200,169,110,0.05) 0%, transparent 70%);
  }

  .closing-seal {
    width: 56px;
    height: 56px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    position: relative;
  }

  .closing-seal::before {
    content: 'QA';
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .closing-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text-muted);
    max-width: 400px;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .closing-rule {
    width: 160px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    margin-bottom: 20px;
  }

  .closing-brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .closing-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ========== NAVIGATION ========== */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 52px;
    background: rgba(10,12,16,0.97);
    border-top: 1px solid var(--obsidian-border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    transition: color 0.2s;
    gap: 8px;
  }

  .nav-btn:hover:not(:disabled) {
    color: var(--gold);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  .nav-btn svg {
    width: 14px;
    height: 14px;
  }

  .nav-center {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 32px;
    border-left: 1px solid var(--obsidian-border);
    border-right: 1px solid var(--obsidian-border);
    height: 100%;
  }

  .nav-page-indicator {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    min-width: 90px;
    text-align: center;
  }

  .nav-dots {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .nav-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--obsidian-border);
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    padding: 0;
  }

  .nav-dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  .nav-dot:hover {
    background: var(--gold-dim);
  }

  /* ========== TOC SIDEBAR ========== */
  .toc-sidebar {
    position: fixed;
    top: 44px;
    left: -280px;
    width: 280px;
    bottom: 52px;
    background: rgba(10,12,16,0.98);
    border-right: 1px solid var(--obsidian-border);
    z-index: 90;
    transition: left 0.3s ease;
    overflow-y: auto;
    padding: 20px;
    backdrop-filter: blur(20px);
  }

  .toc-sidebar.open {
    left: 0;
  }

  .sidebar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--obsidian-border);
  }

  .sidebar-entry {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(31,36,48,0.5);
    cursor: pointer;
    transition: all 0.2s;
  }

  .sidebar-entry:hover .sidebar-ch-num {
    color: var(--gold);
  }

  .sidebar-entry:hover .sidebar-ch-title {
    color: var(--text-primary);
  }

  .sidebar-entry.current .sidebar-ch-num {
    color: var(--gold);
  }

  .sidebar-entry.current .sidebar-ch-title {
    color: var(--text-primary);
  }

  .sidebar-ch-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px;

    body: `The first loss in a collapsing system is not always territory, nor law, nor even trust in its most visible form. Often it is proportion. Things stop appearing at their true scale. A rumor arrives dressed as revelation. A bureaucratic failure is dismissed as temporary when it is structural. Institutions continue in outline after much of their load-bearing capacity has thinned. The system remains legible enough to reassure and illegible enough to mislead.

To see that clearly is not comforting. Clarity is often spoken of as though it were relief — as though naming the structure of a problem somehow reduces its weight. More often, in systems like these, it does the opposite. It removes the small mercies of simplification. The analyst loses the luxury of pretending that propaganda alone produced the fracture, or that governance alone can repair it. The institution loses the luxury of treating information disorder as external noise.

Systems designed around selective advantage do not welcome disciplined seeing. They absorb ambiguity when ambiguity protects power. They reward speed when speed outruns verification. They prefer named enemies to diagnosed structures because structures require longer repair and more honest accounting. Under such conditions, clear analysis is opposed not only by falsehood but by incentive.

Clarity, here, is not comfort. It is infrastructure. It sits beneath decision, beneath public reasoning, beneath the ability of an institution to know what kind of crisis it is actually in. When that infrastructure is weak, every disturbance becomes harder to interpret, every corrective act more vulnerable to distortion. A system may still speak, but it no longer knows how to hear itself accurately.

The closing question is not whether collapse will occur somewhere, or whether information environments will continue to be weaponized. Both are already part of the world we inhabit. The harder question is whether the tools for understanding these processes can be built faster than the processes themselves are deepening — whether institutions can learn transparency before opacity becomes instinct, whether analysis can remain proportionate under pressure, and whether the slow work of structural repair can begin before narrative exploitation makes every grievance available for capture.`,
    notes: []
  }
];

const sidebarContent = [

  `<div class="sidebar-entry" onclick="goToPage(1)"><span class="sidebar-ch-num">TOC</span><span class="sidebar-ch-title">Table of Contents</span></div>`,

  }),

].join('');

// ============================================================
//  BUILD DOTS
// ============================================================
const dotsContainer = document.getElementById('navDots');
// One dot per section: cover, toc, 10 chapters (+notes), closing
// Simplify to group dots: cover, toc, chapters 1-10, closing
const dotGroups = ['Cover', 'TOC', ...chapters.map(c => `Ch.${c.num}`), 'End'];
dotGroups.forEach((label, i) => {
  const dot = document.createElement('button');
  dot.className = 'nav-dot';
  dot.title = label;
  dot.addEventListener('click', () => {
    // Map group index to page index
    if (i === 0) goToPage(0);
    else if (i === 1) goToPage(1);
    else if (i >= 2 && i <= 11) goToChapter(i - 1);
    else goToPage(pages.length - 1);
  });
  dotsContainer.appendChild(dot);
});

// ============================================================
//  NAVIGATION
// ============================================================
let currentPage = 0;
let prevPage = -1;

function updateDots() {
  // Map current page to group
  let groupIdx = 0;
  if (currentPage === 0) groupIdx = 0;
  else if (currentPage === 1) groupIdx = 1;
  else if (currentPage === pages.length - 1) groupIdx = dotGroups.length - 1;
  else {
    // Find chapter
    const chapterEl = pages[currentPage];
    const chNum = chapterEl.dataset.chapter;
    if (chNum) groupIdx = parseInt(chNum) + 1;
    else groupIdx = 2; // default to first chapter group
  }

  document.querySelectorAll('.nav-dot').forEach((d, i) => {
    d.classList.toggle('active', i === groupIdx);
  });
}

function updateSidebarHighlight() {
  const chapterEl = pages[currentPage];
  const chNum = chapterEl ? chapterEl.dataset.chapter : null;
  document.querySelectorAll('.sidebar-entry').forEach(e => {
    e.classList.remove('current');
    if (chNum && e.dataset.chapter === chNum) e.classList.add('current');
  });
}

function showPage(idx) {
  if (idx < 0 || idx >= pages.length) return;

  const direction = idx > currentPage ? 1 : -1;

  if (prevPage >= 0 && prevPage !== idx) {
    const prev = pages[prevPage];
    prev.classList.remove('active');
    if (direction > 0) {
      prev.classList.add('exit-left');
      setTimeout(() => prev.classList.remove('exit-left'), 420);
    }
  }

  prevPage = currentPage;
  currentPage = idx;

  const curr = pages[currentPage];
  curr.classList.remove('exit-left');
  curr.classList.add('active');

  // Update indicator
  document.getElementById('pageIndicator').textContent = `${currentPage + 1} / ${pages.length}`;
  document.getElementById('btnPrev').disabled = currentPage === 0;
  document.getElementById('btnNext').disabled = currentPage === pages.length - 1;
  document.getElementById('btnFirst').disabled = currentPage === 0;
  document.getElementById('btnLast').disabled = currentPage === pages.length - 1;

  updateDots();
  updateSidebarHighlight();
}

function goToPage(idx) {
  showPage(idx);
}

function goToChapter(chNum) {
  // Find chapter page index
  for (let i = 0; i < pages.length; i++) {
    if (pages[i].dataset.chapter === String(chNum)) {
      showPage(i);
      // Close sidebar on mobile
      document.getElementById('tocSidebar').classList.remove('open');
      return;
    }
  }
}

// Initial render
showPage(0);

// Buttons
document.getElementById('btnPrev').addEventListener('click', () => showPage(currentPage - 1));
document.getElementById('btnNext').addEventListener('click', () => showPage(currentPage + 1));
document.getElementById('btnFirst').addEventListener('click', () => showPage(0));
document.getElementById('btnLast').addEventListener('click', () => showPage(pages.length - 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showPage(currentPage + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') showPage(currentPage - 1);
  if (e.key === 'Home') showPage(0);
  if (e.key === 'End') showPage(pages.length - 1);
  if (e.key === 'Escape') document.getElementById('tocSidebar').classList.remove('open');
});

// Sidebar toggle
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('tocSidebar').classList.toggle('open');
});

// Close sidebar on outside click — but never intercept anchor clicks
document.getElementById('pagesContainer').addEventListener('click', (e) => {
  if (e.target.closest('a')) return;
  document.getElementById('tocSidebar').classList.remove('open');
});

// Touch swipe
let touchStartX = 0;
container.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
container.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) showPage(currentPage + 1);
    else showPage(currentPage - 1);
  }
}, {passive: true});
</script>
